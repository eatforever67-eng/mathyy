<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Server Portal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d1117;
            font-family: system-ui, sans-serif;
        }
        .launch-container {
            text-align: center;
            padding: 40px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2 {
            color: #c9d1d9;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .btn-play {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #ff9900 0%, #cc7a00 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
            transition: all 0.2s ease;
        }
        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 153, 0, 0.5);
            background: linear-gradient(135deg, #ffaa22 0%, #dd8a11 100%);
        }
    </style>
</head>
<body>

    <div class="launch-container">
        <h2>Cloud Stream Initialized</h2>
        <!-- Triggers the dynamic memory injection -->
        <button class="btn-play" onclick="launchCodSession()">Launch COD Mobile</button>
    </div>

    <script>
        function launchCodSession() {
            // Uses the direct system application directory for shooters
            const gameUrl = "https://nowgg.nl";

            // Spawn a sterile window instance to drop the GitHub tracking data
            const cleanWindow = window.open('about:blank', '_blank');
            
            if (!cleanWindow) {
                alert("Pop-up Blocked! Please click the pop-up icon in your address bar and allow access.");
                return;
            }

            // Force injection via document write to mask domain restrictions
            cleanWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Cloud Stream Player</title>
                    <style>
                        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
                        embed { width:100%; height:100%; border:none; }
                    </style>
                </head>
                <body>
                    <embed src="${gameUrl}"></embed>
                </body>
                </html>
            `);
            
            cleanWindow.document.close();
        }
    </script>

</body>
</html>
