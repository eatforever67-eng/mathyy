<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IO Arcade Portal</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #0f172a; color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        /* Top Navigation Bar */
        .navbar {
            height: 60px; background-color: #1e293b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 2px solid #334155;
        }
        .logo { font-size: 20px; font-weight: bold; color: #38bdf8; letter-spacing: 1px; }
        .back-btn {
            background-color: #ef4444; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 600; display: none;
        }
        /* Dashboard Game Grid Layout */
        .grid-container {
            height: calc(100% - 60px); overflow-y: auto; padding: 30px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto;
        }
        .game-card {
            background-color: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 25px; text-align: center;
            cursor: pointer; transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column; justify-content: center; height: 160px;
        }
        .game-card:hover {
            transform: translateY(-5px); border-color: #38bdf8;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.1);
        }
        .game-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .game-desc { font-size: 12px; color: #94a3b8; }
        
        /* Hidden Full-Screen Frame Player */
        #game-player {
            width: 100%; height: calc(100% - 60px);
            border: none; display: none; background: #000;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Header Layout -->
    <div class="navbar">
        <div class="logo">IO ARCADE</div>
        <button class="back-btn" id="back-btn" onclick="closeGame()">← Close Game</button>
    </div>

    <!-- Centralized Dashboard Grid Layout -->
    <div class="grid-container" id="grid-container">
        
        <!-- Game Item 1 -->
        <div class="game-card" onclick="loadGame('https://slither.io')">
            <div class="game-title">Slither.io</div>
            <div class="game-desc">Grow the longest snake on the board.</div>
        </div>

        <!-- Game Item 2 -->
        <div class="game-card" onclick="loadGame('https://agar.io')">
            <div class="game-title">Agar.io</div>
            <div class="game-desc">Eat smaller cells to rule the grid.</div>
        </div>

        <!-- Game Item 3 -->
        <div class="game-card" onclick="loadGame('https://diep.io')">
            <div class="game-title">Diep.io</div>
            <div class="game-desc">Tank battle arena upgrades.</div>
        </div>

        <!-- Game Item 4 -->
        <div class="game-card" onclick="loadGame('https://paper-io.com')">
            <div class="game-title">Paper.io</div>
            <div class="game-desc">Conquer territory with color lines.</div>
        </div>

        <!-- Game Item 5 -->
        <div class="game-card" onclick="loadGame('https://hole-io.com')">
            <div class="game-title">Hole.io</div>
            <div class="game-desc">Swallow everything in the city.</div>
        </div>

    </div>

    <!-- Active Frame Element Holder -->
    <iframe id="game-player" src=""></iframe>

    <script>
        const grid = document.getElementById('grid-container');
        const player = document.getElementById('game-player');
        const backBtn = document.getElementById('back-btn');

        // Dynamically loads the target game frame
        function loadGame(url) {
            grid.style.display = 'none';
            player.style.display = 'block';
            backBtn.style.display = 'block';
            player.src = url;
        }

        // Returns back to the home dashboard view
        function closeGame() {
            grid.style.display = 'grid';
            player.style.display = 'none';
            backBtn.style.display = 'none';
            player.src = '';
        }
    </script>
</body>
</html>
